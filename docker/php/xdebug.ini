; Xdebug 3 — debugging from host (Cursor + PHP Debug). Built image loads zend_extension via docker-php-ext-enable.
; Use trigger mode: add ?XDEBUG_TRIGGER=1 to the URL in Postman, or header XDEBUG_TRIGGER: 1

xdebug.mode = debug
xdebug.start_with_request = trigger
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.discover_client_host = 0

; Uncomment while troubleshooting connection issues:
; xdebug.log = /tmp/xdebug.log
; xdebug.log_level = 7
