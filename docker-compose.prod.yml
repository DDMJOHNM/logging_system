# Production stack for EC2. Deploy with:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Copy .env.production.example to .env.production and set secrets before first boot.
# Migrations run via app entrypoint on container start. Do not enable RUN_SEED_ON_START in prod.

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    shm_size: 256mb
    command: ["mysqld", "--innodb-use-native-aio=0"]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-logging}
      MYSQL_USER: ${DB_USERNAME:-logging}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.production}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.production}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      RUN_SEED_ON_START: "false"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  sqs-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      OBSERVABILITY_SQS_CONSUMER_ENABLED: "true"
      RUN_SEED_ON_START: "false"
    command: ["php", "artisan", "observability:consume-sqs"]

volumes:
  mysql_data:
