name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/logging_system' }}
          GIT_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "$EC2_INSTANCE_ID" ]; then
            echo "EC2_INSTANCE_ID secret is required"
            exit 1
          fi

          COMMANDS=$(jq -nc \
            --arg dir "$APP_DIR" \
            --arg ref "$GIT_REF" \
            '[
              "set -euo pipefail",
              ("git config --system --add safe.directory " + $dir),
              ("cd " + $dir),
              "if [ ! -d .git ]; then git clone https://github.com/DDMJOHNM/logging_system.git .; fi",
              "git fetch origin",
              ("git checkout " + $ref),
              ("git pull origin " + $ref),
              "test -f .env.production || { echo \"Missing .env.production on host\"; exit 1; }",
              "CHANGED=$(git diff --name-only ORIG_HEAD HEAD 2>/dev/null || true)",
              "IMAGE_ID=$(docker compose --env-file .env.production -f docker-compose.prod.yml images -q app 2>/dev/null | head -1)",
              "if [ -z \"$IMAGE_ID\" ] || echo \"$CHANGED\" | grep -qE \"^(docker/|docker-compose\\.prod\\.yml)\"; then",
              "  docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build",
              "else",
              "  docker compose --env-file .env.production -f docker-compose.prod.yml up -d",
              "fi",
              "docker compose --env-file .env.production -f docker-compose.prod.yml ps"
            ]')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy ${GITHUB_SHA}" \
            --parameters "$(jq -nc --argjson commands "$COMMANDS" '{commands: $commands}')" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: $COMMAND_ID"

          for i in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Status: $STATUS"

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "[StandardOutputContent, StandardErrorContent]" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --output json
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Deploy timed out waiting for SSM command"
          exit 1
